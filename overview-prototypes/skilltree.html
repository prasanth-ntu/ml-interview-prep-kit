      {

        children: [
          { name: 'New Company Setup', desc: 'AI prompt to set up research for a new target company', link: '/docs/prompt-templates/new-company-setup/' },
          { name: 'Setup Round', desc: 'AI prompt to prepare for a specific interview round', link: '/docs/prompt-templates/setup-round/' },
          { name: 'Prep Drill', desc: 'AI-powered practice drills for interview topics', link: '/docs/prompt-templates/prep-drill/' },
          { name: 'Interview Debrief', desc: 'AI prompt for post-interview analysis', link: '/docs/prompt-templates/interview-debrief/' },
          { name: 'Add Knowledge', desc: 'AI prompt to expand the knowledge base', link: '/docs/prompt-templates/add-knowledge/' },
          { name: 'Check Links', desc: 'AI prompt to validate documentation links', link: '/docs/prompt-templates/check-links/' }
        ]
      }
    ];

    // ─── State ──────────────────────────────────────
    let allNodes = [];    // flat array of { id, x, y, r, color, name, desc, tier, branch, link, parentId, children, related, data }
    let allLinks = [];    // { source, target, tier, color, branchId }
    let viewBox = { x: 0, y: 0, w: 0, h: 0 };
    let centerX, centerY;
    let isPanning = false, panStart = { x: 0, y: 0 }, vbStart = { x: 0, y: 0 };
    let hiddenBranches = new Set();
    let currentZoom = 1;
    let nodeById = {};

    const svg = document.getElementById('skilltree');
    const world = document.getElementById('svgWorld');
    const tooltip = document.getElementById('tooltip');
    const infoPanel = document.getElementById('infoPanel');
    const searchInput = document.getElementById('searchInput');

    // ─── Layout Computation ─────────────────────────
    function buildTree() {
      const R1 = 180;  // branch nodes
      const R2 = 360;  // category nodes
      const R3 = 530;  // topic nodes

      centerX = 0;
      centerY = 0;

      let nodeId = 0;

      // Central node
      const centralNode = {
        id: nodeId++,
        x: centerX,
        y: centerY,
        r: 24,
        color: '#fbbf24',
        glow: '#fbbf24',
        name: 'ML Interview Ready',
        desc: 'Your journey to ML interview mastery. Explore 6 branches covering knowledge, system design, coding, career strategy, and more.',
        tier: 0,
        branch: 'central',
        branchId: 'central',
        link: null,
        parentId: null,
        children: [],
        related: [],
        data: null
      };
      allNodes.push(centralNode);
      nodeById[centralNode.id] = centralNode;

      // Compute angular allocation
      const totalWeight = BRANCHES.reduce((s, b) => s + b.angularWeight, 0);
      let currentAngle = -Math.PI / 2; // start from top

      BRANCHES.forEach((branch) => {
        const angularSpan = (branch.angularWeight / totalWeight) * 2 * Math.PI;
        const branchAngle = currentAngle + angularSpan / 2;

        // Branch node (Tier 1)
        const bx = centerX + R1 * Math.cos(branchAngle);
        const by = centerY + R1 * Math.sin(branchAngle);

        const branchNode = {
          id: nodeId++,
          x: bx, y: by,
          r: 18,
          color: branch.color,
          glow: branch.glow,
          name: branch.name,
          desc: `Explore ${branch.name} topics`,
          tier: 1,
          branch: branch.name,
          branchId: branch.id,
          link: branch.linkBase,
          parentId: centralNode.id,
          children: [],
          related: [],
          data: null
        };
        allNodes.push(branchNode);
        nodeById[branchNode.id] = branchNode;
        centralNode.children.push(branchNode.id);

        allLinks.push({
          source: centralNode.id,
          target: branchNode.id,
          tier: 'tier1',
          color: branch.color,
          branchId: branch.id
        });

        // Get children for this branch
        let cats = [];
        if (branch.source === 'data' && typeof knowledgeMapData !== 'undefined') {
          cats = knowledgeMapData.children || [];
        } else if (branch.children) {
          cats = branch.children;
        }

        const catCount = cats.length;
        if (catCount === 0) { currentAngle += angularSpan; return; }

        const catAngularSpan = angularSpan / catCount;
        const catStartAngle = currentAngle;

        cats.forEach((cat, ci) => {
          const catAngle = catStartAngle + catAngularSpan * (ci + 0.5);
          const cx = centerX + R2 * Math.cos(catAngle);
          const cy = centerY + R2 * Math.sin(catAngle);

          const slug = cat.name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
          const catLink = cat.link || (branch.source === 'data' ? branch.linkBase + '#' + slug : branch.linkBase + slug + '/');

          const catNode = {
            id: nodeId++,
            x: cx, y: cy,
            r: 12,
            color: branch.color,
            glow: branch.glow,
            name: cat.name,
            desc: cat.desc || '',
            tier: 2,
            branch: branch.name,
            branchId: branch.id,
            link: catLink,
            parentId: branchNode.id,
            children: [],
            related: cat.related || [],
            data: cat
          };
          allNodes.push(catNode);
          nodeById[catNode.id] = catNode;
          branchNode.children.push(catNode.id);

          allLinks.push({
            source: branchNode.id,
            target: catNode.id,
            tier: 'tier2',
            color: branch.color,
            branchId: branch.id
          });

          // Tier 3: sub-topics (only for KB branch or branches with sub-children)
          const subTopics = cat.children || [];
          if (subTopics.length > 0) {
            const subAngularSpan = catAngularSpan / subTopics.length;

            subTopics.forEach((sub, si) => {
              const subAngle = catStartAngle + catAngularSpan * ci + subAngularSpan * (si + 0.5);
              const sx = centerX + R3 * Math.cos(subAngle);
              const sy = centerY + R3 * Math.sin(subAngle);

              const subSlug = sub.name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
              const subLink = sub.link || catLink;

              const subNode = {
                id: nodeId++,
                x: sx, y: sy,
                r: 6,
                color: branch.color,
                glow: branch.glow,
                name: sub.name,
                desc: sub.desc || '',
                tier: 3,
                branch: branch.name,
                branchId: branch.id,
                link: subLink,
                parentId: catNode.id,
                children: [],
                related: sub.related || [],
                data: sub
              };
              allNodes.push(subNode);
              nodeById[subNode.id] = subNode;
              catNode.children.push(subNode.id);

              allLinks.push({
                source: catNode.id,
                target: subNode.id,
                tier: 'tier3',
                color: branch.color,
                branchId: branch.id
              });
            });
          }
        });

        currentAngle += angularSpan;
      });
    }

    // ─── Starfield ────────────────────────────────────
    function initStarfield() {
      const canvas = document.getElementById('starfield');
      const ctx = canvas.getContext('2d');
      let stars = [];

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        generateStars();
      }

      function generateStars() {
        stars = [];
        const count = Math.floor((canvas.width * canvas.height) / 2000);
        for (let i = 0; i < count; i++) {
          stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 1.2 + 0.3,
            a: Math.random() * 0.5 + 0.1,
            twinkleSpeed: Math.random() * 0.02 + 0.005,
            twinklePhase: Math.random() * Math.PI * 2
          });
        }
      }

      function drawStars(time) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Central radial glow
        const grad = ctx.createRadialGradient(
          canvas.width / 2, canvas.height / 2, 0,
          canvas.width / 2, canvas.height / 2, Math.max(canvas.width, canvas.height) * 0.5
        );
        grad.addColorStop(0, 'rgba(59, 130, 246, 0.04)');
        grad.addColorStop(1, 'transparent');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        stars.forEach(s => {
          const flicker = Math.sin(time * s.twinkleSpeed + s.twinklePhase) * 0.3 + 0.7;
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(200, 220, 255, ${s.a * flicker})`;
          ctx.fill();
        });

        requestAnimationFrame(drawStars);
      }

      window.addEventListener('resize', resize);
      resize();
      requestAnimationFrame(drawStars);
    }

    // ─── Render SVG ─────────────────────────────────
    function render() {
      world.innerHTML = '';

      // Concentric rings
      [180, 360, 530].forEach(r => {
        const ring = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        ring.setAttribute('cx', centerX);
        ring.setAttribute('cy', centerY);
        ring.setAttribute('r', r);
        ring.classList.add('tier-ring');
        world.appendChild(ring);
      });

      // Links as quadratic bezier curves
      allLinks.forEach(link => {
        if (hiddenBranches.has(link.branchId)) return;
        const src = nodeById[link.source];
        const tgt = nodeById[link.target];

        // Compute a control point offset perpendicular to the line, biased toward center
        const mx = (src.x + tgt.x) / 2;
        const my = (src.y + tgt.y) / 2;
        const dx = tgt.x - src.x;
        const dy = tgt.y - src.y;
        const len = Math.sqrt(dx * dx + dy * dy) || 1;
        // Slight curve: perpendicular offset toward center
        const curvature = link.tier === 'tier1' ? 0.08 : link.tier === 'tier2' ? 0.12 : 0.15;
        const cx = mx + (-dy / len) * len * curvature * (Math.random() > 0.5 ? 1 : -1) * 0;
        const cy = my + (dx / len) * len * curvature * 0;
        // For radial layout, curve slightly toward center
        const distFromCenter = Math.sqrt(mx * mx + my * my) || 1;
        const pullX = mx - (mx / distFromCenter) * len * 0.05;
        const pullY = my - (my / distFromCenter) * len * 0.05;

        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', `M ${src.x} ${src.y} Q ${pullX} ${pullY} ${tgt.x} ${tgt.y}`);
        path.setAttribute('stroke', link.color);
        path.classList.add('st-link', link.tier, 'animated');
        path.dataset.branch = link.branchId;
        path.dataset.source = link.source;
        path.dataset.target = link.target;
        world.appendChild(path);
      });

      // Nodes
      allNodes.forEach(node => {
        if (node.branchId !== 'central' && hiddenBranches.has(node.branchId)) return;

        const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        g.classList.add('st-node');
        g.dataset.id = node.id;
        g.dataset.branch = node.branchId;

        // Outer ring for tier 1 and 2
        if (node.tier === 1 || node.tier === 2) {
          const outerRing = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          outerRing.setAttribute('cx', node.x);
          outerRing.setAttribute('cy', node.y);
          outerRing.setAttribute('r', node.r + 3);
          outerRing.setAttribute('fill', 'none');
          outerRing.setAttribute('stroke', node.color);
          outerRing.setAttribute('stroke-width', '1');
          outerRing.setAttribute('stroke-opacity', '0.3');
          g.appendChild(outerRing);
        }

        const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        circle.setAttribute('cx', node.x);
        circle.setAttribute('cy', node.y);
        circle.setAttribute('r', node.r);
        circle.setAttribute('fill', node.color);
        circle.classList.add('node-circle');

        if (node.tier === 0) {
          circle.classList.add('central-node-circle');
          circle.setAttribute('fill', '#fbbf24');
          circle.setAttribute('filter', 'url(#glow-gold)');
          // Add a second outer glow ring for central
          const outerGlow = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          outerGlow.setAttribute('cx', node.x);
          outerGlow.setAttribute('cy', node.y);
          outerGlow.setAttribute('r', node.r + 6);
          outerGlow.setAttribute('fill', 'none');
          outerGlow.setAttribute('stroke', '#fbbf24');
          outerGlow.setAttribute('stroke-width', '1.5');
          outerGlow.setAttribute('stroke-opacity', '0.4');
          g.appendChild(outerGlow);
        } else if (node.tier === 1) {
          circle.setAttribute('filter', 'url(#glow-strong)');
        } else if (node.tier === 2) {
          circle.setAttribute('filter', 'url(#glow-subtle)');
        }

        g.appendChild(circle);

        // Labels — positioned based on angle from center
        if (node.tier <= 2) {
          const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          text.classList.add('node-label');

          // Determine angle for label placement
          const angle = Math.atan2(node.y - centerY, node.x - centerX);
          const isRight = Math.abs(angle) < Math.PI / 2;
          const isTop = angle < 0;

          if (node.tier === 0) {
            text.setAttribute('x', node.x);
            text.setAttribute('y', node.y + node.r + 18);
            text.setAttribute('text-anchor', 'middle');
            text.setAttribute('font-size', '14');
            text.setAttribute('font-weight', '800');
            text.setAttribute('fill', '#fbbf24');
          } else if (node.tier === 1) {
            // Position label outside the node, away from center
            const labelDist = node.r + 16;
            text.setAttribute('x', node.x + Math.cos(angle) * labelDist);
            text.setAttribute('y', node.y + Math.sin(angle) * labelDist + 4);
            text.setAttribute('text-anchor', isRight ? 'start' : 'end');
            text.setAttribute('font-size', '12');
            text.setAttribute('font-weight', '700');
            text.setAttribute('fill', node.color);
          } else {
            // Tier 2: smaller labels positioned away from center
            const labelDist = node.r + 10;
            const lx = node.x + Math.cos(angle) * labelDist;
            const ly = node.y + Math.sin(angle) * labelDist + 3;
            text.setAttribute('x', lx);
            text.setAttribute('y', ly);
            text.setAttribute('text-anchor', isRight ? 'start' : 'end');
            text.setAttribute('font-size', '8');
            text.setAttribute('font-weight', '500');
          }

          // Truncate long labels
          let label = node.name;
          const maxLen = node.tier === 2 ? 16 : 20;
          if (label.length > maxLen) label = label.substring(0, maxLen - 2) + '..';
          text.textContent = label;
          g.appendChild(text);
        }

        // Event listeners
        g.addEventListener('mouseenter', (e) => onNodeHover(node, e));
        g.addEventListener('mouseleave', () => onNodeLeave());
        g.addEventListener('click', (e) => { e.stopPropagation(); onNodeClick(node); });
        g.addEventListener('dblclick', (e) => { e.stopPropagation(); onNodeDblClick(node); });

        world.appendChild(g);
      });

      // Energy particles — small circles that flow along tier1 links
      startEnergyParticles();
    }

    // ─── Energy Particles ───────────────────────────
    let particleAnimFrame = null;
    function startEnergyParticles() {
      if (particleAnimFrame) cancelAnimationFrame(particleAnimFrame);

      // Create particle group
      let particleGroup = document.getElementById('particleLayer');
      if (particleGroup) particleGroup.remove();
      particleGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      particleGroup.id = 'particleLayer';
      world.appendChild(particleGroup);

      // Create particles for tier1 links
      const particles = [];
      allLinks.forEach(link => {
        if (link.tier !== 'tier1') return;
        if (hiddenBranches.has(link.branchId)) return;
        const src = nodeById[link.source];
        const tgt = nodeById[link.target];
        for (let i = 0; i < 3; i++) {
          const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          dot.setAttribute('r', '2');
          dot.setAttribute('fill', link.color);
          dot.setAttribute('filter', 'url(#glow-subtle)');
          dot.setAttribute('opacity', '0.8');
          particleGroup.appendChild(dot);
          particles.push({
            el: dot,
            sx: src.x, sy: src.y,
            tx: tgt.x, ty: tgt.y,
            t: Math.random(),
            speed: 0.003 + Math.random() * 0.004
          });
        }
      });

      function animate() {
        particles.forEach(p => {
          p.t += p.speed;
          if (p.t > 1) p.t -= 1;
          const x = p.sx + (p.tx - p.sx) * p.t;
          const y = p.sy + (p.ty - p.sy) * p.t;
          p.el.setAttribute('cx', x);
          p.el.setAttribute('cy', y);
          // Fade at endpoints
          const fade = Math.sin(p.t * Math.PI);
          p.el.setAttribute('opacity', (fade * 0.7 + 0.1).toFixed(2));
        });
        particleAnimFrame = requestAnimationFrame(animate);
      }

      if (particles.length > 0) requestAnimationFrame(animate);
    }

    // ─── Tooltip ────────────────────────────────────
    function onNodeHover(node, e) {
      document.getElementById('tooltipName').textContent = node.name;
      document.getElementById('tooltipDesc').textContent = node.desc || '';
      document.getElementById('tooltipHint').textContent = node.tier === 0 ? 'click to fit all' : node.tier === 1 ? 'click for details · dbl-click to zoom' : 'click for details';

      tooltip.classList.add('visible');

      const rect = tooltip.getBoundingClientRect();
      let tx = e.clientX + 16;
      let ty = e.clientY - 10;
      if (tx + rect.width > window.innerWidth - 10) tx = e.clientX - rect.width - 16;
      if (ty + rect.height > window.innerHeight - 10) ty = window.innerHeight - rect.height - 10;
      if (ty < 60) ty = 60;

      tooltip.style.left = tx + 'px';
      tooltip.style.top = ty + 'px';

      // Highlight connected path
      highlightAncestors(node);
    }

    function onNodeLeave() {
      tooltip.classList.remove('visible');
      clearHighlights();
    }

    function highlightAncestors(node) {
      // Dim everything
      document.querySelectorAll('.st-node').forEach(n => n.classList.add('dimmed'));
      document.querySelectorAll('.st-link').forEach(l => l.classList.add('dimmed'));

      // Highlight this node and ancestors
      let current = node;
      const highlightIds = new Set();
      while (current) {
        highlightIds.add(current.id);
        current = current.parentId !== null ? nodeById[current.parentId] : null;
      }
      // Also highlight children
      node.children.forEach(cid => highlightIds.add(cid));

      highlightIds.forEach(id => {
        const el = document.querySelector(`.st-node[data-id="${id}"]`);
        if (el) { el.classList.remove('dimmed'); el.classList.add('highlighted'); }
      });

      // Highlight links on the path
      allLinks.forEach(link => {
        if (highlightIds.has(link.source) && highlightIds.has(link.target)) {
          const el = document.querySelector(`.st-link[data-source="${link.source}"][data-target="${link.target}"]`);
          if (el) { el.classList.remove('dimmed'); el.classList.add('highlighted'); }
        }
      });
    }

    function clearHighlights() {
      document.querySelectorAll('.st-node').forEach(n => { n.classList.remove('dimmed', 'highlighted'); });
      document.querySelectorAll('.st-link').forEach(l => { l.classList.remove('dimmed', 'highlighted'); });
    }

    // ─── Node Click → Info Panel ────────────────────
    function onNodeClick(node) {
      if (node.tier === 0) {
        fitToScreen();
        return;
      }

      const panel = document.getElementById('infoPanelContent');
      const branchColor = node.color;

      let html = `<h2 style="color:${branchColor}">${node.name}</h2>`;
      html += `<span class="info-branch" style="background:${branchColor}22;color:${branchColor};border:1px solid ${branchColor}44">${node.branch}</span>`;

      if (node.desc) {
        html += `<p class="info-desc">${node.desc}</p>`;
      }

      // Related topics
      if (node.related && node.related.length > 0) {
        html += `<div class="info-related"><h4>Related Topics</h4><div class="related-tags">`;
        node.related.forEach(r => {
          html += `<span class="related-tag" onclick="window._searchFor('${r.replace(/'/g, "\\'")}')">${r}</span>`;
        });
        html += `</div></div>`;
      }

      // Children
      if (node.children.length > 0) {
        html += `<div class="info-children"><h4>Sub-topics (${node.children.length})</h4><div class="child-list">`;
        node.children.forEach(cid => {
          const child = nodeById[cid];
          if (child) {
            html += `<div class="child-item" onclick="window._selectNode(${child.id})">
              <span style="color:${child.color};margin-right:6px">&#9679;</span>${child.name}
              ${child.desc ? '<br><small style="color:var(--text-muted);margin-left:18px">' + child.desc.substring(0, 80) + (child.desc.length > 80 ? '...' : '') + '</small>' : ''}
            </div>`;
          }
        });
        html += `</div></div>`;
      }

      // Link
      if (node.link) {
        html += `<a class="info-link" href="${node.link}" style="background:${branchColor}22;color:${branchColor};border:1px solid ${branchColor}44">Open in Docs &rarr;</a>`;
      }

      panel.innerHTML = html;
      infoPanel.classList.add('open');
    }

    window._selectNode = function(id) {
      const node = nodeById[id];
      if (node) onNodeClick(node);
    };

    window._searchFor = function(term) {
      searchInput.value = term;
      doSearch(term);
    };

    function onNodeDblClick(node) {
      if (node.tier <= 1) {
        zoomToBranch(node);
      }
    }

    // ─── Pan & Zoom ─────────────────────────────────
    function initViewBox() {
      const w = svg.clientWidth;
      const h = svg.clientHeight;
      const extent = 650;
      viewBox = {
        x: centerX - extent,
        y: centerY - extent,
        w: extent * 2,
        h: extent * 2 * (h / w)
      };
      applyViewBox();
    }

    function applyViewBox() {
      svg.setAttribute('viewBox', `${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`);
    }

    function fitToScreen() {
      const w = svg.clientWidth;
      const h = svg.clientHeight;
      const extent = 650;
      const aspect = h / w;
      viewBox = {
        x: centerX - extent,
        y: centerY - extent,
        w: extent * 2,
        h: extent * 2 * aspect
      };
      currentZoom = 1;
      smoothTransition(() => applyViewBox());
    }

    function zoomToBranch(node) {
      // Find all descendant nodes
      const descendants = [];
      function collectDescendants(n) {
        descendants.push(n);
        n.children.forEach(cid => {
          const child = nodeById[cid];
          if (child) collectDescendants(child);
        });
      }
      collectDescendants(node);

      // If only central node, fit to screen
      if (descendants.length <= 1) { fitToScreen(); return; }

      let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
      descendants.forEach(d => {
        minX = Math.min(minX, d.x - 40);
        maxX = Math.max(maxX, d.x + 40);
        minY = Math.min(minY, d.y - 40);
        maxY = Math.max(maxY, d.y + 40);
      });

      // Include central node for context
      minX = Math.min(minX, centerX - 30);
      maxX = Math.max(maxX, centerX + 30);
      minY = Math.min(minY, centerY - 30);
      maxY = Math.max(maxY, centerY + 30);

      const padding = 80;
      const w = svg.clientWidth;
      const h = svg.clientHeight;
      const aspect = h / w;
      let vw = (maxX - minX) + padding * 2;
      let vh = vw * aspect;
      if ((maxY - minY) + padding * 2 > vh) {
        vh = (maxY - minY) + padding * 2;
        vw = vh / aspect;
      }

      viewBox = {
        x: (minX + maxX) / 2 - vw / 2,
        y: (minY + maxY) / 2 - vh / 2,
        w: vw,
        h: vh
      };

      smoothTransition(() => applyViewBox());
    }

    function smoothTransition(cb) {
      svg.style.transition = 'none';
      const startVB = { ...viewBox };

      // Read current
      const parts = svg.getAttribute('viewBox').split(' ').map(Number);
      const from = { x: parts[0], y: parts[1], w: parts[2], h: parts[3] };
      const to = { ...viewBox };

      let startTime = null;
      const duration = 400;

      function step(ts) {
        if (!startTime) startTime = ts;
        const t = Math.min((ts - startTime) / duration, 1);
        const ease = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;

        viewBox.x = from.x + (to.x - from.x) * ease;
        viewBox.y = from.y + (to.y - from.y) * ease;
        viewBox.w = from.w + (to.w - from.w) * ease;
        viewBox.h = from.h + (to.h - from.h) * ease;
        applyViewBox();

        if (t < 1) requestAnimationFrame(step);
        else { viewBox = to; applyViewBox(); }
      }

      requestAnimationFrame(step);
    }

    // Mouse/touch pan
    svg.addEventListener('pointerdown', (e) => {
      if (e.target.closest('.st-node')) return;
      isPanning = true;
      panStart = { x: e.clientX, y: e.clientY };
      vbStart = { x: viewBox.x, y: viewBox.y };
      svg.setPointerCapture(e.pointerId);
    });

    svg.addEventListener('pointermove', (e) => {
      if (!isPanning) return;
      const dx = e.clientX - panStart.x;
      const dy = e.clientY - panStart.y;
      const scale = viewBox.w / svg.clientWidth;
      viewBox.x = vbStart.x - dx * scale;
      viewBox.y = vbStart.y - dy * scale;
      applyViewBox();
    });

    svg.addEventListener('pointerup', () => { isPanning = false; });
    svg.addEventListener('pointercancel', () => { isPanning = false; });

    // Close info panel on canvas click
    svg.addEventListener('click', (e) => {
      if (!e.target.closest('.st-node')) {
        infoPanel.classList.remove('open');
      }
    });

    // Scroll zoom
    svg.addEventListener('wheel', (e) => {
      e.preventDefault();
      const factor = e.deltaY > 0 ? 1.08 : 0.92;
      zoomBy(factor, e.clientX, e.clientY);
    }, { passive: false });

    function zoomBy(factor, cx, cy) {
      const svgRect = svg.getBoundingClientRect();
      const mx = viewBox.x + (cx - svgRect.left) / svgRect.width * viewBox.w;
      const my = viewBox.y + (cy - svgRect.top) / svgRect.height * viewBox.h;

      viewBox.w *= factor;
      viewBox.h *= factor;
      viewBox.x = mx - (cx - svgRect.left) / svgRect.width * viewBox.w;
      viewBox.y = my - (cy - svgRect.top) / svgRect.height * viewBox.h;
      currentZoom /= factor;
      applyViewBox();
    }

    // Zoom buttons
    document.getElementById('zoomIn').addEventListener('click', () => {
      zoomBy(0.7, svg.clientWidth / 2, svg.clientHeight / 2);
    });
    document.getElementById('zoomOut').addEventListener('click', () => {
      zoomBy(1.4, svg.clientWidth / 2, svg.clientHeight / 2);
    });
    document.getElementById('zoomFit').addEventListener('click', fitToScreen);

    // ─── Search ─────────────────────────────────────
    function doSearch(query) {
      const q = query.trim().toLowerCase();
      if (!q) {
        clearSearch();
        return;
      }

      document.querySelectorAll('.st-node').forEach(el => {
        const id = parseInt(el.dataset.id);
        const node = nodeById[id];
        if (!node) return;

        const match = node.name.toLowerCase().includes(q) || (node.desc && node.desc.toLowerCase().includes(q));
        if (match) {
          el.classList.remove('dimmed');
          el.classList.add('search-match');
        } else {
          el.classList.add('dimmed');
          el.classList.remove('search-match');
        }
      });

      document.querySelectorAll('.st-link').forEach(el => {
        el.classList.add('dimmed');
      });
    }

    function clearSearch() {
      document.querySelectorAll('.st-node').forEach(el => {
        el.classList.remove('dimmed', 'search-match');
      });
      document.querySelectorAll('.st-link').forEach(el => {
        el.classList.remove('dimmed');
      });
    }

    searchInput.addEventListener('input', (e) => doSearch(e.target.value));
    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        searchInput.value = '';
        clearSearch();
        searchInput.blur();
      }
    });

    // ─── Legend ──────────────────────────────────────
    function buildLegend() {
      const container = document.getElementById('legendItems');
      BRANCHES.forEach(branch => {
        const item = document.createElement('div');
        item.classList.add('legend-item');
        item.dataset.branch = branch.id;
        item.innerHTML = `<span class="legend-dot" style="background:${branch.color};box-shadow:0 0 6px ${branch.color}"></span><span>${branch.name}</span>`;
        item.addEventListener('click', () => {
          if (hiddenBranches.has(branch.id)) {
            hiddenBranches.delete(branch.id);
            item.classList.remove('hidden');
          } else {
            hiddenBranches.add(branch.id);
            item.classList.add('hidden');
          }
          render();
        });
        container.appendChild(item);
      });
    }

    // ─── Theme ──────────────────────────────────────
    function initTheme() {
      const saved = localStorage.getItem('ml-prep-theme');
      if (saved === 'light') {
        document.documentElement.setAttribute('data-theme', 'light');
      }
      updateThemeIcon();
    }

    function toggleTheme() {
      const isLight = document.documentElement.getAttribute('data-theme') === 'light';
      if (isLight) {
        document.documentElement.removeAttribute('data-theme');
        localStorage.setItem('ml-prep-theme', 'dark');
      } else {
        document.documentElement.setAttribute('data-theme', 'light');
        localStorage.setItem('ml-prep-theme', 'light');
      }
      updateThemeIcon();
    }

    function updateThemeIcon() {
      const isLight = document.documentElement.getAttribute('data-theme') === 'light';
      document.getElementById('themeIcon').innerHTML = isLight
        ? '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>'
        : '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
    }

    document.getElementById('themeToggle').addEventListener('click', toggleTheme);

    // ─── Info Panel Close ───────────────────────────
    document.getElementById('infoPanelClose').addEventListener('click', () => {
      infoPanel.classList.remove('open');
    });

    // ─── Keyboard Shortcuts ─────────────────────────
    document.addEventListener('keydown', (e) => {
      if (e.key === '/' && document.activeElement !== searchInput) {
        e.preventDefault();
        searchInput.focus();
      }
      if (e.key === 'Escape') {
        infoPanel.classList.remove('open');
      }
    });

    // ─── Window Resize ──────────────────────────────
    window.addEventListener('resize', () => {
      fitToScreen();
    });

    // ─── Init ───────────────────────────────────────
    initTheme();
    initStarfield();
    buildTree();
    buildLegend();
    render();
    initViewBox();

    // Animate in: start zoomed in, then fit
    const w = svg.clientWidth;
    const h = svg.clientHeight;
    const aspect = h / w;
    viewBox = { x: -80, y: -80, w: 160, h: 160 * aspect };
    applyViewBox();
    setTimeout(() => fitToScreen(), 300);

  })();
  </script>
</body>
</html>
